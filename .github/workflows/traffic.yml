name: GitHub Metrics
on:
  schedule:
    - cron: "0 * * * *" # Toutes les heures
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.TRAFFIC_TOKEN }}
          user: LTX128
          repo: Best-setting_user-for-key-fob
          plugin_traffic: yes
          base: "" # On ne veut que le graphique de trafic
          filename: github-metrics-traffic.svg
