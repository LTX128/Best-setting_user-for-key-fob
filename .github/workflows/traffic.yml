name: Update Count
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate Views Badge
        uses: anton-hersh/github-views-action@v1.1
        with:
          token: ${{ secrets.TRAFFIC_TOKEN }}
          repository: LTX128/Best-setting_user-for-key-fob
