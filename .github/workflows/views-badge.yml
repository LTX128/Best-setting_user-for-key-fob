name: Update Views Badge

# Déclenche le workflow toutes les heures et permet aussi de le lancer manuellement
on:
  schedule:
    - cron: '0 * * * *'  # toutes les heures à la minute 0
  workflow_dispatch:       # option pour lancer manuellement

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get repo views
        run: |
          # Récupère le nombre de vues via l'API GitHub
          TOTAL=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/LTX128/Best-setting_user-for-key-fob/traffic/views | jq '.count')
          # Ajoute les 900 vues existantes
          TOTAL=$((TOTAL + 900))
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Generate badge
        run: |
          curl -s "https://img.shields.io/badge/Views-$TOTAL-blue?style=flat-square" -o views.svg

      - name: Commit badge
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add views.svg
          git commit -m "Update views badge" || echo "No changes"
          git push
