name: Update Repo Views Badge

on:
  schedule:
    - cron: '0 * * * *' # toutes les heures
  workflow_dispatch: # permet de lancer manuellement

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get repo views
        uses: octokit/request-action@v2
        id: views
        with:
          route: GET /repos/${{ github.repository }}/traffic/views

      - name: Save views count
        run: |
          echo "VIEWS=$((${{ steps.views.outputs.total_count }} + 900))" >> $GITHUB_ENV

      - name: Generate badge
        run: |
          curl -s "https://img.shields.io/badge/Views-$VIEWS-blue?style=flat-square" -o views.svg

      - name: Commit badge
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add views.svg
          git commit -m "Update views badge" || echo "No changes"
          git push
