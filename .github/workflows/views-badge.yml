name: Update Views Badge

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get repo views safely
        run: |
          echo "Récupération des vues..."
          RESPONSE=$(curl -s -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/LTX128/Best-setting_user-for-key-fob/traffic/views)
          
          # Récupère le nombre de vues, sinon met 0
          COUNT=$(echo "$RESPONSE" | grep -o '"count":[0-9]*' | head -1 | grep -o '[0-9]*')
          if [ -z "$COUNT" ]; then
            COUNT=0
          fi
          
          # Ajoute les 900 vues existantes
          TOTAL=$((COUNT + 900))
          echo "TOTAL=$TOTAL"
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Generate badge
        run: |
          curl -s "https://img.shields.io/badge/Views-$TOTAL-blue?style=flat-square" -o views.svg

      - name: Safe commit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add views.svg
          git diff --cached --quiet || git commit -m "Update views badge"
          git push || echo "Push échoué, vérifier les droits"
