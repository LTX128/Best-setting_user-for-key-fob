name: Metrics
on:
  schedule:
    - cron: "0 * * * *" # Toutes les heures
  workflow_dispatch: # Permet de lancer manuellement
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LTX128
          repo: Best-setting_user-for-key-fob
          template: classic
          base: "" # On vide la base pour ne garder que ce qu'on veut
          plugin_traffic: yes # C'est ICI que les vues sont gérées
